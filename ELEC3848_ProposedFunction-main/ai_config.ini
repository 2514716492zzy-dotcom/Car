# AI Model Configuration
# Each section defines a model config that can be referenced by name
# Format:
#   [config-name] - Reference name used in code
#   model - Actual model name for API calls
#   api_key_env - Environment variable name for API key
#   base_url_env - Environment variable name for base URL

[qwen3-30b-a3b]
model = Qwen/Qwen3-30B-A3B
api_key_env = SILICONFLOW_API_KEY
base_url_env = SILICONFLOW_API_URL

[deepseek-v3.1]
model = DeepSeek-V3.1-Fast
api_key_env = AIHUB_API_KEY
base_url_env = AIHUB_API_URL

[gpt5-mini]
model = gpt-5-mini
api_key_env = AIHUB_API_KEY
base_url_env = AIHUB_API_URL

[gemini-2.5]
model = gemini-2.5-flash-lite
api_key_env = AIHUB_API_KEY
base_url_env = AIHUB_API_URL

[gpt-oss]
model = gpt-oss-120b
api_key_env = AIHUB_API_KEY
base_url_env = AIHUB_API_URL
