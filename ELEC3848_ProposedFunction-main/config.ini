# LLM Module Configuration
# Default settings for model calls

[llm]
default_model = gpt-oss
default_temperature = 0.7

# Neko Agent Configuration
# Conversation management settings

[neko_agent]
silence_timeout = 20
max_history_turns = 5

[tts]
; Voice options: normal, cute_sox
voice = cute_sox
language = en
speed = normal

[hardware]
; Serial port configuration
port = /dev/ttyUSB1
baudrate = 115200
